<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão a Marte - Three.js</title>
    <style>
        /* Removemos as margens para o canvas ocupar o ecrã inteiro */
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. CONFIGURAÇÃO BÁSICA
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202); // Fundo quase preto (espaço)
        scene.fog = new THREE.FogExp2(0x8B4513, 0.015); // Nevoeiro marciano para dar profundidade

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); // Posição inicial da câmara (atrás e acima do rover)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Ativar sombras realistas
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. ILUMINAÇÃO
        // ==========================================
        // Luz Ambiente (evita que as sombras fiquem totalmente pretas)
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        // Luz Direcional (Simula o Sol)
        const sunLight = new THREE.DirectionalLight(0xffaa88, 2); // Cor ligeiramente alaranjada
        sunLight.position.set(50, 50, 20);
        sunLight.castShadow = true;
        
        // Aumentar a área de captura das sombras
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        scene.add(sunLight);

        // ==========================================
        // 3. O TERRENO MARCIANO
        // ==========================================
        // O chão base
        // Aumentamos o número de segmentos (100x100) para ter mais vértices para deformar
        const terrainGeometry = new THREE.PlaneGeometry(200, 200, 100, 100);

        // Deitar o plano na horizontal
        terrainGeometry.rotateX(-Math.PI / 2);

        // Aceder ao array de vértices da geometria
        const positions = terrainGeometry.attributes.position;

        // Percorrer cada vértice e alterar a sua altura (eixo Y)
        for (let i = 0; i < positions.count; i++) {
            // Obter as coordenadas X e Z atuais do vértice
            const x = positions.getX(i);
            const z = positions.getZ(i);
            
            // Criar dunas suaves usando funções seno e cosseno baseadas na posição
            let y = Math.sin(x * 0.05) * 2;
            y += Math.cos(z * 0.05) * 2;
            
            // Adicionar um pouco de "ruído" aleatório para simular pedras e aspereza
            y += (Math.random() - 0.5) * 0.5;

            // Atualizar a altura (Y) do vértice
            positions.setY(i, y);
        }

        // Dizer ao Three.js para recalcular como a luz bate nas novas inclinações
        terrainGeometry.computeVertexNormals();

        const terrainMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, 
            roughness: 0.9, // Areia e pedra quase não refletem luz (perto de 1)
            metalness: 0.1, 
            flatShading: true // Dá um estilo "low-poly" que ajuda a disfarçar a falta de texturas reais
        });

        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // ==========================================
        // 4. O ROVER (PLACEHOLDER)
        // ==========================================
        // Este cubo servirá como o corpo base onde irás construir o modelo final
        const roverGroup = new THREE.Group(); // Usamos um grupo para facilitar a adição de rodas depois
        
        const bodyGeometry = new THREE.BoxGeometry(2, 1, 3);
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        const roverBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
        roverBody.position.y = 1; // Elevar para acomodar futuras rodas
        roverBody.castShadow = true;
        
        roverGroup.add(roverBody);
        scene.add(roverGroup);

        // ==========================================
        // 5. CONTROLOS E EVENTOS
        // ==========================================
        // Permite usar o rato para rodar, fazer zoom e pan à câmara
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.copy(roverGroup.position); // Focar a câmara no Rover
        controls.enableDamping = true; // Dá uma inércia suave ao movimento da câmara
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Impede a câmara de ir para debaixo do chão
        controls.minDistance = 3;  // Zoom máximo
        controls.maxDistance = 20; // Zoom mínimo

        // Ajustar o renderizador quando a janela do browser muda de tamanho
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 6. LOOP DE ANIMAÇÃO
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            
            // Atualizar os controlos (obrigatório quando enableDamping = true)
            controls.update();

            // Renderizar a cena a cada frame
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
